<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2233"/>
      <stop offset="100%" stop-color="#06141B"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5BA3C8"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Outer progress ring -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="rgba(91,163,200,0.18)" stroke-width="22"/>
  <circle cx="256" cy="256" r="175" fill="none" stroke="url(#ring)" stroke-width="22"
    stroke-linecap="round" stroke-dasharray="1100" stroke-dashoffset="280"
    transform="rotate(-90 256 256)"/>
  <!-- Fork & leaf icon in center -->
  <!-- Leaf shape -->
  <ellipse cx="256" cy="230" rx="42" ry="58" fill="none" stroke="#4ade80" stroke-width="14" stroke-linecap="round"/>
  <line x1="256" y1="172" x2="256" y2="340" stroke="#4ade80" stroke-width="14" stroke-linecap="round"/>
  <!-- Fork tines -->
  <line x1="215" y1="220" x2="215" y2="170" stroke="#5BA3C8" stroke-width="12" stroke-linecap="round"/>
  <line x1="235" y1="220" x2="235" y2="170" stroke="#5BA3C8" stroke-width="12" stroke-linecap="round"/>
  <path d="M215 220 Q225 250 225 290 L225 340" fill="none" stroke="#5BA3C8" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- E letter hint -->
  <text x="256" y="372" text-anchor="middle" fill="#5BA3C8" font-family="Arial,sans-serif" font-size="52" font-weight="900" opacity="0.7">ER</text>
</svg>
